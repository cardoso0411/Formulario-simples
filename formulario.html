<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #3498db;
            color: #fff;
            padding: 20px;
            margin-top: 0;
        }

        form {
            background-color: #fff;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        input[type="date"],
        input[type="datetime-local"],
        textarea,
        select,
        input[type="color"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }

        input[type="submit"],
        input[type="reset"] {
            background-color: #3498db;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <h1>Formulário de Cadastro</h1>
    <form action="processar.php" method="POST">
        <label for="NOME">Nome</label>
        <input type="text" name="NOME" id="NOME" placeholder="Seu Nome Completo" required>
        <label for="CPF">CPF</label>
        <input type="text" name="CPF" id="CPF" placeholder="111.222.333-44" required>
        <label for="RG">RG</label>
        <input type="text" name="RG" id="RG" placeholder="99.999.999-9">
        <label for="idade">Idade</label>
        <input type="number" name="idade" id="idade" min="0" max="115" step="1" required>
        <label for="cep">CEP</label>
        <input type="text" name="cep" id="cep" placeholder="12345-678" required>
        <label for="endereco">Endereço</label>
        <input type="text" name="endereco" id="endereco" placeholder="Rua Fulano de Tal">
        <label for="cidade">Cidade</label>
        <input type="text" name="cidade" id="cidade">
        <label for= "complemento">Complemento</label>
        <input type="text" name="complemento" id="complemento">
        <label for="numero">Número</label>
        <input type="text" name="numero" id="numero" placeholder="Número de sua casa">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="email321@gmail.com">
        <label for="tel">Telefone</label>
        <input type="tel" name="telefone" id="telefone" placeholder="(99) 9999-9999">
        <label for="url">URL</label>
        <input type="url" name="url" id="url" placeholder="https://www.sitedojoao.com.br">
        <label for="data">Data</label>
        <input type="date" name="data" id="data">
        <label for="datahora">Data e Hora</label>
        <input type="datetime-local" name="datahora" id="datahora">
        <label for="descricao">Descrição</label>
        <textarea name="descricao" id="descricao" rows="4"></textarea>
        <label>Sexo</label>
        <input type="radio" name="sexo" id="masculino" value="masculino"> Masculino
        <input type="radio" name="sexo" id="feminino" value="feminino"> Feminino
        <label for="linguagem">Linguagem:</label>
        <select name="linguagem" id="linguagem">
            <option value="java">Java</option>
            <option value="php">PHP</option>
            <option value="Python">Python</option>
        </select>
        <label for="Periodo">Período</label>
        <input type="checkbox" name="Periodo[]" id="Manha" value="manha"> Manhã
        <input type="checkbox" name="Periodo[]" id="tarde" value="tarde"> Tarde
        <input type="checkbox" name="Periodo[]" id="noite" value="noite"> Noite
        <label for="cor">Cor</label>
        <div class="color-preview-container">
            <input type="color" id="cor" name="cor">
            <div class="color-preview" id="cor-preview"></div>
        </div>
        <br><br>
        <label for="arquivo">Arquivo</label>
        <input type="file" name="arquivo" id="arquivo">
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
    <script>
        const colorInput = document.getElementById('cor');
        const colorPreview = document.getElementById('cor-preview');

        colorInput.addEventListener('input', function() {
            colorPreview.style.backgroundColor = colorInput.value;
        });
    </script>
</body>
</html>
